<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <a href="../../index.html" class="back-link">← Back to Portfolio</a>
    <div class="header-title">
      <span class="header-icon">🌤️</span>
      <span>Weather Dashboard</span>
    </div>
    <div class="unit-toggle">
      <button class="unit-btn active" id="btn-c" data-unit="C">°C</button>
      <button class="unit-btn" id="btn-f" data-unit="F">°F</button>
    </div>
  </header>

  <main class="app-main">
    <div class="search-section">
      <form class="search-form" id="search-form">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search any city..."
          autocomplete="off"
        >
        <button type="submit" class="search-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </form>
      <button class="location-btn" id="location-btn" title="Use my location">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        Use my location
      </button>
    </div>

    <div class="error-msg" id="error-msg" hidden></div>

    <div class="weather-layout" id="weather-layout" hidden>
      <div class="current-card">
        <div class="current-top">
          <div>
            <h1 class="city-name" id="city-name">—</h1>
            <p class="country-name" id="country-name">—</p>
            <p class="local-time" id="local-time">—</p>
          </div>
          <div class="weather-icon-wrap" id="weather-icon">☀️</div>
        </div>
        <div class="current-bottom">
          <div class="temp-main" id="temp-main">—</div>
          <div class="condition-text" id="condition-text">—</div>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-icon">💧</div>
            <div class="stat-value" id="humidity">—%</div>
            <div class="stat-label">Humidity</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">🌬️</div>
            <div class="stat-value" id="wind-speed">— km/h</div>
            <div class="stat-label">Wind</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">🌡️</div>
            <div class="stat-value" id="feels-like">—</div>
            <div class="stat-label">Feels Like</div>
          </div>
        </div>
      </div>

      <div class="forecast-section">
        <h2 class="forecast-title">7-Day Forecast</h2>
        <div class="forecast-grid" id="forecast-grid"></div>
      </div>
    </div>

    <div class="placeholder-state" id="placeholder-state">
      <div class="placeholder-icon">🌍</div>
      <p class="placeholder-text">Search for a city or use your location to see the weather.</p>
    </div>

    <div class="loading-state" id="loading-state" hidden>
      <div class="spinner"></div>
      <p>Fetching weather...</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
